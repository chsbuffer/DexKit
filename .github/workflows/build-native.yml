name: Build DexKit Native Libraries

env:
  LINUX_FOCAL_SYSROOT_PATH: .dexkit-sysroot/ubuntu-20.04-x86_64
  LINUX_SYSROOT_CACHE_KEY_PREFIX: dexkit-linux-amd64-sysroot-v1

on:
  push:
    branches: [ master ]
    tags: [ '*' ]
  pull_request:
    branches: [ master ]

jobs:
  build-native:
    strategy:
      matrix:
        sys:
          - { name: linux,             os: ubuntu-latest,  shell: bash, linux: true,  codename: focal,  sysroot: .dexkit-sysroot/ubuntu-20.04-x86_64, compat: none,   artifact: linux }
          - { name: linux-ubuntu18.04, os: ubuntu-latest,  shell: bash, linux: true,  codename: bionic, sysroot: .dexkit-sysroot/ubuntu-18.04-x86_64, compat: bionic, artifact: linux-ubuntu18.04 }
          - { name: linux-ubuntu16.04, os: ubuntu-latest,  shell: bash, linux: true,  codename: xenial, sysroot: .dexkit-sysroot/ubuntu-16.04-x86_64, compat: xenial, artifact: linux-ubuntu16.04 }
          - { name: windows,           os: windows-latest, shell: bash, linux: false }
          - { name: macos,             os: macos-latest,   shell: bash, linux: false }
    defaults:
      run:
        shell: ${{ matrix.sys.shell }}
    runs-on: ${{ matrix.sys.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          version: 3.25.0

      - name: Install Linux build tools
        if: ${{ matrix.sys.linux }}
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld ninja-build binutils xz-utils

      - name: Restore target Linux sysroot cache
        if: ${{ matrix.sys.linux }}
        id: cache_linux_sysroot
        uses: actions/cache@v4
        with:
          path: ${{ matrix.sys.sysroot }}.tar.xz
          key: ${{ env.LINUX_SYSROOT_CACHE_KEY_PREFIX }}-${{ matrix.sys.codename }}-${{ hashFiles('build-support/linux-sysroot/**') }}

      - name: Restore focal Linux sysroot cache
        if: ${{ matrix.sys.linux && matrix.sys.codename != 'focal' }}
        id: cache_linux_focal_sysroot
        uses: actions/cache@v4
        with:
          path: ${{ env.LINUX_FOCAL_SYSROOT_PATH }}.tar.xz
          key: ${{ env.LINUX_SYSROOT_CACHE_KEY_PREFIX }}-focal-${{ hashFiles('build-support/linux-sysroot/**') }}

      - name: Build missing Linux sysroots
        if: ${{ matrix.sys.linux }}
        run: |
          build_sysroot() {
            local codename="$1"
            local path="$2"

            if [ -f "$path.tar.xz" ]; then
              return
            fi

            rm -rf "$path"
            sudo env \
              UBUNTU_CODENAME="$codename" \
              bash build-support/linux-sysroot/build-linux-sysroot.sh "$path"
            sudo tar -C "$path" \
              --exclude=./dev \
              --exclude=./proc \
              --exclude=./sys \
              --exclude=./run \
              --exclude=./tmp \
              --exclude=./var/tmp \
              -cJf "$path.tar.xz" .
            sudo chown "$USER:$USER" "$path.tar.xz"
            sudo rm -rf "$path"
            sudo chown -R "$USER:$USER" "$(dirname "$path")"
          }

          build_sysroot "${{ matrix.sys.codename }}" "${{ matrix.sys.sysroot }}"
          if [ "${{ matrix.sys.compat }}" != "none" ]; then
            build_sysroot focal "$LINUX_FOCAL_SYSROOT_PATH"
          fi

      - name: Unpack Linux sysroots
        if: ${{ matrix.sys.linux }}
        run: |
          unpack_sysroot() {
            local path="$1"
            rm -rf "$path"
            mkdir -p "$path"
            tar -C "$path" -xJf "$path.tar.xz"
          }

          unpack_sysroot "${{ matrix.sys.sysroot }}"
          if [ "${{ matrix.sys.compat }}" != "none" ] && [ "${{ matrix.sys.sysroot }}" != "$LINUX_FOCAL_SYSROOT_PATH" ]; then
            unpack_sysroot "$LINUX_FOCAL_SYSROOT_PATH"
          fi

      - name: Prepare Linux compatibility headers
        if: ${{ matrix.sys.linux && matrix.sys.compat != 'none' }}
        run: |
          compat_dir="$GITHUB_WORKSPACE/.dexkit-sysroot/compat"
          target_sysroot="$GITHUB_WORKSPACE/${{ matrix.sys.sysroot }}"
          template_dir="$GITHUB_WORKSPACE/build-support/linux-sysroot"
          mkdir -p "$compat_dir/gcc5-thread-wrapper"
          cp "$template_dir/glibc-libstdcxx10-compat.h" "$compat_dir/glibc-libstdcxx10-compat.h"

          if [ "${{ matrix.sys.compat }}" = "xenial" ]; then
            sed "s|@TARGET_SYSROOT@|$target_sysroot|g" \
              "$template_dir/gcc5-thread-wrapper/thread.in" \
              > "$compat_dir/gcc5-thread-wrapper/thread"
            sed "s|@TARGET_SYSROOT@|$target_sysroot|g" \
              "$template_dir/gcc5-thread-wrapper/future.in" \
              > "$compat_dir/gcc5-thread-wrapper/future"
          fi

      - name: Run Gradle CMake build (linux)
        if: ${{ matrix.sys.linux }}
        run: |
          chmod +x gradlew
          mkdir -p "artifacts/native/${{ matrix.sys.artifact }}"

          tmpdir="$(mktemp -d)"
          cat > "$tmpdir/LoadNative.java" <<'EOF'
          public class LoadNative {
              public static void main(String[] args) {
                  System.load(args[0]);
              }
          }
          EOF
          javac "$tmpdir/LoadNative.java"

          sysroot="$GITHUB_WORKSPACE/${{ matrix.sys.sysroot }}"
          focal_headers="$GITHUB_WORKSPACE/$LINUX_FOCAL_SYSROOT_PATH/usr/include"
          compat_dir="$GITHUB_WORKSPACE/.dexkit-sysroot/compat"
          compat_header="$compat_dir/glibc-libstdcxx10-compat.h"

          case "${{ matrix.sys.compat }}" in
            none)
              cxxflags=""
              ;;
            bionic)
              cxxflags="-nostdinc++ -isystem $focal_headers/c++/10 -isystem $focal_headers/x86_64-linux-gnu/c++/10 -include $compat_header"
              ;;
            xenial)
              cxxflags="-fno-exceptions -nostdinc++ -isystem $compat_dir/gcc5-thread-wrapper -isystem $focal_headers/c++/10 -isystem $focal_headers/x86_64-linux-gnu/c++/10 -include $compat_header"
              ;;
          esac

          rm -rf dexkit/build/cmake/main
          export CC="clang --sysroot=$sysroot --gcc-toolchain=$sysroot/usr"
          export CXX="clang++ --sysroot=$sysroot --gcc-toolchain=$sysroot/usr"
          export AR=llvm-ar
          export RANLIB=llvm-ranlib
          export LD=ld.lld
          export CFLAGS=""
          export CXXFLAGS="$cxxflags"
          export LDFLAGS="-Wl,--no-as-needed -lpthread"

          ./gradlew :dexkit:cmakeBuild --console=plain --no-daemon --rerun-tasks

          lib="$(find dexkit/build/cmake/main -name libdexkit.so -type f | head -n 1)"
          test -n "$lib"
          file "$lib"

          real_lib="$(readlink -f "$lib")"
          java -cp "$tmpdir" LoadNative "$real_lib"

          cp "$lib" "artifacts/native/${{ matrix.sys.artifact }}/libdexkit.so"

      - name: Run Gradle CMake build (windows)
        if: ${{ matrix.sys.name == 'windows' }}
        run: |
          chmod +x gradlew
          ./gradlew :dexkit:cmakeBuild --console=plain

      - name: Run Gradle package build (macOS)
        if: ${{ matrix.sys.name == 'macos' }}
        run: |
          chmod +x gradlew
          ./gradlew :dexkit:cmakeBuild :dexkit:jar :dexkit:sourcesJar :dexkit-android:assembleRelease :dexkit-android:sourcesJar --console=plain

      - name: Collect build artifacts
        run: |
          if [ "${RUNNER_OS}" = "Linux" ]; then
            test -f "artifacts/native/${{ matrix.sys.artifact }}/libdexkit.so"
          elif [ "${RUNNER_OS}" = "Windows" ]; then
            rm -rf artifacts
            mkdir -p artifacts/native/windows
            cp dexkit/build/cmake/main/*/libdexkit.dll artifacts/native/windows/
          elif [ "${RUNNER_OS}" = "macOS" ]; then
            rm -rf artifacts
            mkdir -p artifacts/native/macos artifacts/jvm artifacts/android
            cp dexkit/build/cmake/main/*/libdexkit.dylib artifacts/native/macos/
            cp dexkit/build/libs/dexkit.jar artifacts/jvm/
            cp dexkit/build/libs/dexkit-sources.jar artifacts/jvm/
            cp dexkit-android/build/outputs/aar/dexkit-android-release.aar artifacts/android/dexkit-android.aar
            cp dexkit-android/build/libs/dexkit-android-sources.jar artifacts/android/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dexkit-build-${{ matrix.sys.name }}
          path: artifacts/

  package-all:
    needs: build-native
    runs-on: ubuntu-latest
    env:
      PACKAGE_ROOT: dexkit-all-platforms
    steps:
      - name: Download and merge workflow artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dexkit-build-*
          path: ${{ env.PACKAGE_ROOT }}
          merge-multiple: true

      - name: Verify combined artifact layout
        run: |
          test -f $PACKAGE_ROOT/jvm/dexkit.jar
          test -f $PACKAGE_ROOT/jvm/dexkit-sources.jar
          test -f $PACKAGE_ROOT/android/dexkit-android.aar
          test -f $PACKAGE_ROOT/android/dexkit-android-sources.jar
          test -f $PACKAGE_ROOT/native/linux/libdexkit.so
          test -f $PACKAGE_ROOT/native/linux-ubuntu18.04/libdexkit.so
          test -f $PACKAGE_ROOT/native/linux-ubuntu16.04/libdexkit.so
          test -f $PACKAGE_ROOT/native/macos/libdexkit.dylib
          test -f $PACKAGE_ROOT/native/windows/libdexkit.dll

      - name: Delete individual platform artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: dexkit-build-*

      - name: Upload combined ZIP
        uses: actions/upload-artifact@v4
        with:
          name: dexkit-all-platforms
          path: ${{ env.PACKAGE_ROOT }}/
